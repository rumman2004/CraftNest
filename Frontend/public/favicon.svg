<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="CraftNest favicon">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#d4b26a" stop-opacity="0.65"/>
      <stop offset="60%" stop-color="#264670" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#13213c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="29" fill="url(#glow)" stroke="#13213c" stroke-width="1.5" opacity="0.35"/>

  <!-- Heart (handmade love) -->
  <path
    d="M20 23c0-3.8 3.1-7 7-7 2.7 0 5.1 1.6 6.4 4 1.3-2.4 3.7-4 6.4-4 3.9 0 7 3.2 7 7 0 7-9.4 12.3-13.4 17.2-.9 1.1-2.1 1.1-3 0C29.4 35.3 20 30 20 23z"
    fill="none"
    stroke="#d4b26a"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Crochet hook -->
  <g stroke="#264670" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M45 15l6-2 3 2-1.5 4.5-4 2.5"/>
    <path d="M51 13.5c1.8-1.2 4 .4 3.6 2.5-.3 1.5-2.3 1.9-3.6 1.3"/>
    <circle cx="54" cy="15" r="1.4" fill="#264670" stroke="none"/>
  </g>

  <!-- Yarn spiral -->
  <g stroke="#c69e4f" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M16 41c6 7 14 9.5 22 3.5"/>
    <path d="M15 45c3 3.5 8.5 6 13.5 5"/>
  </g>

  <!-- Sparkles -->
  <g fill="#d4b26a">
    <circle cx="18" cy="18" r="1.5"/>
    <circle cx="40" cy="45" r="1.2"/>
    <circle cx="26" cy="14" r="1"/>
  </g>
</svg>